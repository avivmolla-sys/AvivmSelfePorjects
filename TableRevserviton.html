<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>VITA ITALIA - חוויה קולינרית</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="main-header">
        <div class="logo-wrapper">
            <img src="../ImgLogo/logo.png" alt="Icon" class="extra-img">
            <img src="../ImgLogo/logo2.png" alt="Icon" class="extra-img">
            <div class="logo-text">VITA ITALIA</div>
        </div>

        <nav class="nav-navigation">
                <div class="nav-links">
                    <a href="index.html">חזרה לדף הבית</a>
                    <a href="ContactUs.html">צור קשר</a>
                    <a href="gallery.html">גלריה</a>
                    <a href="AboutUs.html">מי אנחנו</a>
                  <a href="TableRevserviton.html">  <button class="reserve-btn">הזמנת מקום</button> </a>
                </div>
            </nav>
    </header>
<main class="reservation-page">
    <section class="reservation-container">
        <div class="reservation-header">
            <h1 class="hero-title">הזמנת שולחן</h1>
            <div class="hero-divider"></div>
            <p class="hero-subtitle">הבטיחו לעצמכם מקום בחוויה האיטלקית הבאה</p>
        </div>

        <form class="reservation-form">
            <div class="form-group">
                <label for="name">שם מלא</label>
                <input type="text" id="name" name="name" placeholder="הכנס את שמך" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="date">תאריך</label>
                    <input type="date" id="date" name="date" required>
                </div>
                <div class="form-group">
                    <label for="time">שעה</label>
                    <input type="time" id="time" name="time" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="guests">מספר סועדים</label>
                    <input type="number" id="guests" name="guests" min="1" max="20" value="2" required>
                </div>
                <div class="form-group">
                    <label for="phone">טלפון ליצירת קשר</label>
                    <input type="tel" id="phone" name="phone" placeholder="050-0000000" required>
                </div>
            </div>

            <div class="form-group">
                <label for="notes">הערות מיוחדות (אלרגיות, יום הולדת וכו')</label>
                <textarea id="notes" name="notes" rows="3" placeholder="נשמח לדעת אם יש משהו שנוכל להכין עבורכם..."></textarea>
            </div>

            <button type="submit" class="submit-reservation">אשרו הזמנה</button>
        </form>
    </section>
</main>
</body>


</html>
