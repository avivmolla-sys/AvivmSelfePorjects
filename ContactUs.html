<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>VITA ITALIA - חוויה קולינרית</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="main-header">
        <div class="logo-wrapper">
            <img src="../ImgLogo/logo.png" alt="Icon" class="extra-img">
            <img src="../ImgLogo/logo2.png" alt="Icon" class="extra-img">
            <div class="logo-text">VITA ITALIA</div>
        </div>
              <nav class="nav-navigation">
                <div class="nav-links">
                    <a href="index.html">חזרה לדף הבית</a>
                    <a href="ContactUs.html">צור קשר</a>
                    <a href="gallery.html">גלריה</a>
                    <a href="AboutUs.html">מי אנחנו</a>
                  <a href="TableRevserviton.html">  <button class="reserve-btn">הזמנת מקום</button> </a>
                </div>
            </nav>
    </header>
<main class="contact-page">
    <div class="contact-wrapper">
        <div class="contact-header">
            <h1 class="hero-title">צרו קשר</h1>
            <div class="hero-divider"></div>
            <p class="hero-subtitle">אנחנו כאן לכל שאלה, בקשה או אירוע פרטי</p>
        </div>

        <div class="contact-content">
            <div class="contact-info">
                <div class="info-item">
                    <h3 class="gold-text">היכן אנחנו?</h3>
                    <p>רחוב  מזא''ה פינת מאפו, תל אביב</p>
                </div>

                <div class="info-item">
                    <h3 class="gold-text">דברו איתנו</h3>
                    <p>טלפון: 03-1234567</p>
                    <p>אימייל: info@vitaitalia.co.il</p>
                </div>

                <div class="info-item">
                    <h3 class="gold-text">שעות פעילות</h3>
                    <p>א' - ה': 12:00 - 00:00</p>
                    <p>ו' - שבת: 18:00 - 01:00</p>
                </div>
                
                <div class="social-links">
                 <a href="#">  <img src="ContactPic/icons8-instagram-logo.gif" alt="Instagram" class="extra-img2"></a> 
                 <a href="#">  <img src="ContactPic/icons8-facebook-100.gif" alt="Facebook" class="extra-img2"></a> 
                </div>
            </div>

            <div class="contact-form-container">
                <form class="contact-form">
                    <div class="form-group">
                        <label>שם מלא</label>
                        <input type="text" placeholder="הכנס את שמך" required>
                    </div>
                    <div class="form-group">
                        <label>אימייל</label>
                        <input type="email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>נושא</label>
                        <select>
                            <option>שאלה כללית</option>
                            <option>אירוע פרטי</option>
                            <option>הצעת עבודה</option>
                            <option>אחר</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>הודעה</label>
                        <textarea rows="5" placeholder="איך נוכל לעזור?"></textarea>
                    </div>
                    <button type="submit" class="submit-btn">שלחו הודעה</button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>

</html>
