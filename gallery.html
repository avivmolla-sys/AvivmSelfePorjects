<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>גלריה - VITA ITALIA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="gallery-page">

    <header class="main-header">
        <div class="logo-wrapper">
            <img src="../ImgLogo/logo.png" alt="Icon" class="extra-img">

        </div>
        <nav class="nav-navigation">
            <div class="nav-links">
                <a href="index.html">חזרה לדף הבית</a>
                <a href="ContactUs.html">צור קשר</a>

    <main class="gallery-container">
        <div class="gallery-header">
            <h1 class="hero-title">רגעים של טעם</h1>
            <div class="hero-divider"></div>
            <p class="hero-subtitle">הצצה אל המטבח, האווירה והמנות שלנו</p>

        <div class="gallery-grid">
            <div class="gallery-item">

            <div class="gallery-item tall">

            <div class="gallery-item">

            <div class="gallery-item wide">

            </div>
            <div class="gallery-item">
                <img src="galleryPic/Tiramisu.png" alt="קינוח">
                <div class="gallery-overlay"><span>טירמיסו זהב</span></div>
            </div>
            <div class="gallery-item">
                <img src="galleryPic/Team.png" alt="צוות המטבח">

            </div>
